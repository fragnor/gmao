<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini GMAO - Tradebe</title>
    <style>
        :root {
            --tradebe-blue: #003B5C;
            --tradebe-green: #85C441;
            --gray-light: #f4f7f6;
            --gray-dark: #808080;
            --danger-red: #dc3545;
            --warning-orange: #ffc107;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gray-light);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--tradebe-blue);
            color: white;
            width: 100%;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--tradebe-green);
        }

        .container {
            width: 95%;
            max-width: 900px;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--tradebe-green);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #6da332;
        }

        #dashboard-section { display: none; }
        
        .role-badge {
            display: inline-block;
            background-color: var(--tradebe-blue);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-bottom: 15px;
        }

        .section-separator {
            background-color: #e2ebf0;
            padding: 8px 12px;
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: var(--tradebe-blue);
            border-left: 5px solid var(--tradebe-blue);
            border-radius: 4px;
        }

        .ticket-row {
            border-bottom: 1px solid #eee;
            padding: 12px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #fff;
        }

        .ticket-content {
            flex: 1;
            min-width: 280px;
            font-size: 0.95em;
        }

        .ticket-actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            width: auto;
            padding: 6px 12px;
            margin: 0;
            font-size: 0.85em;
        }

        .btn-edit { background-color: var(--warning-orange); color: #333; }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete { background-color: var(--danger-red); }
        .btn-delete:hover { background-color: #bd2130; }
        .btn-blue { background-color: var(--tradebe-blue); }
        .btn-blue:hover { background-color: #00263e; }

        .estado-gris { color: var(--gray-dark); background: #fdfdfd; }
        .estado-negrita { font-weight: bold; color: black; background: #fff; border-left: 4px solid var(--tradebe-green); }
        
        #loading { display: none; text-align: center; color: var(--tradebe-blue); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <header>
        <h2>Sistema GMAO - Tradebe Environmental Services</h2>
    </header>

    <div id="loading">Conectando con el servidor...</div>

    <!-- SECCIÓN LOGIN -->
    <div class="container" id="login-section">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="username" placeholder="Usuario" autocomplete="off">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <p id="login-error" style="color: red; display: none;"></p>
    </div>

    <!-- SECCIÓN DASHBOARD -->
    <div class="container" id="dashboard-section">
        <div>
            Usuario: <span id="display-user" style="font-weight: bold;"></span> 
            <span class="role-badge" id="display-role"></span>
            <button onclick="logout()" style="width: auto; float: right; background-color: var(--danger-red); padding: 5px 10px; margin: 0;">Salir</button>
        </div>
        <hr style="margin: 15px 0;">

        <!-- Selector de Filtro por Área (Mecánicos e Ingeniería) -->
        <div id="container-filtros" style="display: none; background: #eef2f5; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #ddd;">
            <label for="filter-area" style="font-weight: bold; color: var(--tradebe-blue); font-size: 0.9em;">Filtrar Listado por Área:</label>
            <select id="filter-area" onchange="aplicarFiltroAreaLocal()" style="margin-top: 5px;"></select>
        </div>

        <!-- Formulario Registro / Edición para Producción -->
        <div id="form-produccion" style="display: none;">
            <h3 id="form-title">Reportar Nueva Avería</h3>
            <input type="hidden" id="edit-ticket-id" value="">
            
            <label for="select-area">Área:</label>
            <select id="select-area"><option value="">Selecciona Área</option></select>
            
            <label for="select-maquina">Máquina / Equipo:</label>
            <select id="select-maquina"><option value="">Selecciona Máquina</option></select>
            
            <label for="desc-averia">Observaciones / Comentarios:</label>
            <textarea id="desc-averia" rows="3" placeholder="Escribe aquí las observaciones del parte..."></textarea>
            
            <div style="display:flex; gap:10px;">
                <button id="btn-submit-form" onclick="guardarAveria()">Crear Parte</button>
                <button id="btn-cancel-edit" onclick="cancelarEdicion()" style="background-color:var(--gray-dark); display:none; width:auto;">Cancelar</button>
            </div>
            <hr style="margin: 20px 0;">
        </div>

        <!-- Formulario de Cierre de OT para Mantenimiento -->
        <div id="form-mantenimiento" style="display: none; background-color: #f0f7f4; padding: 15px; border-radius: 6px; border: 1px solid var(--tradebe-green); margin-bottom: 20px;">
            <h3>Ejecutar e Introducir Datos de OT</h3>
            <input type="hidden" id="mante-ticket-id" value="">
            <p><strong>OT Seleccionada:</strong> <span id="mante-ot-info">Ninguna</span></p>
            
            <label for="mante-fecha-cierre">Fecha de Cierre / Ejecución:</label>
            <input type="date" id="mante-fecha-cierre">

            <label for="mante-horas">Horas de Trabajo:</label>
            <input type="number" id="mante-horas" step="0.5" placeholder="Ej: 2.5">
            
            <label for="mante-materiales">Material Empleado:</label>
            <textarea id="mante-materiales" rows="2" placeholder="Describa los repuestos o materiales usados..."></textarea>
            
            <label for="mante-observaciones">Observaciones Técnico / Resolución:</label>
            <textarea id="mante-observaciones" rows="3" placeholder="Detalles de la intervención técnica..."></textarea>
            
            <div style="display:flex; gap:10px;">
                <button onclick="enviarCierreOT()" style="background-color: var(--tradebe-blue);">Cerrar y Guardar OT</button>
                <button onclick="cancelarCierreOT()" style="background-color: var(--gray-dark); width:auto;">Cancelar</button>
            </div>
        </div>

        <h3 id="titulo-listado">Listado de Órdenes de Trabajo</h3>
        <div id="tickets-container" style="border: 1px solid #ddd; border-radius: 4px; overflow: hidden;"></div>
    </div>

    <script>
        // ==========================================================
        // INSERTE ENLACE APPSCRIPT AQUI ABAJO
        // ==========================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcypHLARLWZlO5GbH5oVXXWwDqKjW2GbbIjROAtrpi5zB9WQdPdEEGuVBKx4Hca3RB/exec"; 
        
        let currentUser = "";
        let currentRole = "";
        let globalAreas = [];
        let globalMaquinas = [];
        let globalTickets = []; // Guardado local para filtrado instantáneo

        function normalizarTexto(str) {
            if (!str) return "";
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        }

        async function fetchAPI(payload) {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                document.getElementById('loading').style.display = 'none';
                if (!result.success) throw new Error(result.error);
                return result.data;
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert("Error de comunicación: " + error.message);
                throw error;
            }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            try {
                const data = await fetchAPI({ action: 'login', usuario: user, password: pass });
                currentUser = user;
                currentRole = normalizarTexto(data.rol);
                
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('display-role').innerText = data.rol;

                if (currentRole === 'produccion') {
                    document.getElementById('form-produccion').style.display = 'block';
                    document.getElementById('container-filtros').style.display = 'none';
                } else if (currentRole === 'ingenieria' || currentRole === 'mantenimiento') {
                    document.getElementById('form-produccion').style.display = 'none';
                    document.getElementById('container-filtros').style.display = 'block';
                } else {
                    document.getElementById('form-produccion').style.display = 'none';
                    document.getElementById('container-filtros').style.display = 'none';
                }
                
                document.getElementById('form-mantenimiento').style.display = 'none';

                loadDashboard();
            } catch (e) {
                document.getElementById('login-error').innerText = e.message;
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            currentUser = ""; currentRole = ""; globalTickets = [];
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('filter-area').value = "";
            cancelarEdicion();
            cancelarCierreOT();
        }

        async function loadDashboard() {
            const data = await fetchAPI({ action: 'getData' });
            globalAreas = data.areas;
            globalMaquinas = data.maquinas;
            globalTickets = data.tickets; // Mantiene el array completo en memoria
            
            poblarDesplegablesYFiltros();
            renderTickets(globalTickets);
        }

        function poblarDesplegablesYFiltros() {
            // Desplegables de creación de Producción
            if (currentRole === 'produccion') {
                const sArea = document.getElementById('select-area');
                const sMaquina = document.getElementById('select-maquina');
                sArea.innerHTML = '<option value="">Selecciona Área</option>';
                sMaquina.innerHTML = '<option value="">Selecciona Máquina</option>';
                globalAreas.forEach(a => sArea.innerHTML += `<option value="${a}">${a}</option>`);
                globalMaquinas.forEach(m => sMaquina.innerHTML += `<option value="${m}">${m}</option>`);
            }

            // Desplegable de filtro para Ingeniería y Mantenimiento
            if (currentRole === 'ingenieria' || currentRole === 'mantenimiento') {
                const fArea = document.getElementById('filter-area');
                const valorPrevio = fArea.value; // Mantiene selección si refresca
                fArea.innerHTML = '<option value="">-- Ver Todas las Áreas --</option>';
                globalAreas.forEach(a => fArea.innerHTML += `<option value="${a}">${a}</option>`);
                if(valorPrevio) fArea.value = valorPrevio;
            }
        }

        function aplicarFiltroAreaLocal() {
            renderTickets(globalTickets);
        }

        function renderTickets(tickets) {
            const container = document.getElementById('tickets-container');
            container.innerHTML = "";

            // 1. Filtrado Local por Área si aplica
            const areaSeleccionada = document.getElementById('filter-area').value;
            let ticketsFiltrados = tickets;
            if ((currentRole === 'ingenieria' || currentRole === 'mantenimiento') && areaSeleccionada) {
                ticketsFiltrados = tickets.filter(t => t.area === areaSeleccionada);
            }

            // 2. Clasificación por Estatus
            let pendientes = ticketsFiltrados.filter(t => t.estado === 'Pendiente');
            let validadas = ticketsFiltrados.filter(t => t.estado === 'Validada');
            let cerradas = ticketsFiltrados.filter(t => t.estado === 'Cerrada').slice(0, 10); // Límite estricto de las últimas 10

            // 3. Renderizado Condicional por Rol
            if (currentRole === 'mantenimiento') {
                container.innerHTML += `<div class="section-separator">📋 OTs VALIDADAS (Por Gestionar)</div>`;
                if(validadas.length === 0) container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>No hay órdenes validadas listas para reparación.</p>";
                validadas.forEach(t => container.innerHTML += htmlFilaTicket(t, "estado-negrita"));

                container.innerHTML += `<div class="section-separator">⏳ OTs PENDIENTES DE VALIDACIÓN</div>`;
                if(pendientes.length === 0) container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>No hay órdenes pendientes en este momento.</p>";
                pendientes.forEach(t => container.innerHTML += htmlFilaTicket(t, "estado-gris"));

            } else if (currentRole === 'ingenieria') {
                container.innerHTML += `<div class="section-separator">⏳ OTs PENDIENTES DE VALIDACIÓN (Acción Requerida)</div>`;
                if(pendientes.length === 0) container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>¡Al día! No hay órdenes pendientes de autorizar.</p>";
                pendientes.forEach(t => container.innerHTML += htmlFilaTicket(t, "estado-negrita"));

                container.innerHTML += `<div class="section-separator">📋 OTs YA VALIDADAS (Enviadas a Taller)</div>`;
                if(validadas.length === 0) container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>No hay órdenes en proceso de taller.</p>";
                validadas.forEach(t => container.innerHTML += htmlFilaTicket(t, "estado-gris"));

            } else {
                // Perfil de Producción
                container.innerHTML += `<div class="section-separator">🛠️ OTs EN CURSO / EN PROCESO</div>`;
                let activas = pendientes.concat(validadas);
                if(activas.length === 0) container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>No tienes órdenes activas reportadas.</p>";
                activas.forEach(t => container.innerHTML += htmlFilaTicket(t, ""));
            }

            // 4. Separador Común e Histórico de Incidencias Resueltas (Máx 10) para todos los perfiles
            container.innerHTML += `<div class="section-separator" style="margin-top:35px; background-color:#e6f4ea; border-left-color:#34a853; color:#137333;">✅ HISTÓRICO: ÚLTIMAS 10 OTs CERRADAS / RESUELTAS</div>`;
            if(cerradas.length === 0) {
                container.innerHTML += "<p style='padding:15px; margin:0; font-size:0.9em; color:#666;'>No constan intervenciones cerradas en el registro.</p>";
            } else {
                cerradas.forEach(t => container.innerHTML += htmlFilaTicket(t, "estado-gris"));
            }
        }

        function htmlFilaTicket(t, statusClass) {
            let tagFecha = `<small style="color:#666;">[Creada: ${t.fechaCreacion || '---'}]</small>`;
            let tagCierre = t.fechaCierre ? `<br><small style="color:#137333;">🎯 <strong>Resuelta el:</strong> ${t.fechaCierre}</small>` : '';

            let html = `
                <div class="ticket-row ${statusClass}">
                    <div class="ticket-content">
                        ${tagFecha} <strong>${t.usuario}</strong> - ${t.area} - ${t.maquina} - <em>"${t.descripcion}"</em>
                        ${t.horas ? `<br><small style="color:var(--tradebe-blue);">🔧 <strong>Intervención:</strong> ${t.horas}h | <strong>Material:</strong> ${t.materiales} | <strong>Técnico:</strong> ${t.obsMante}</small>` : ''}
                        ${tagCierre}
                        <br><small style="color:#677;">Estatus: <strong>${t.estado}</strong></small>
                    </div>
                    <div class="ticket-actions">
            `;

            if (currentRole === 'produccion' && t.estado === 'Pendiente') {
                html += `
                    <button class="btn-small btn-edit" onclick="prepararEdicion(${t.id}, '${t.area}', '${t.maquina}', \`${t.descripcion}\`)">Editar</button>
                    <button class="btn-small btn-delete" onclick="borrarAveria(${t.id})">Borrar</button>
                `;
            }

            if (currentRole === 'ingenieria' && t.estado === 'Pendiente') {
                html += `<button class="btn-small btn-blue" onclick="cambiarEstado(${t.id}, 'Validada')">Validar OT</button>`;
            } 
            else if (currentRole === 'mantenimiento' && t.estado === 'Validada') {
                html += `<button class="btn-small btn-green" style="background-color:var(--tradebe-green);" onclick="abrirFormularioOT(${t.id}, '${t.area}', '${t.maquina}')">Gestionar OT</button>`;
            }

            html += `
                    </div>
                </div>
            `;
            return html;
        }

        async function guardarAveria() {
            const id = document.getElementById('edit-ticket-id').value;
            const area = document.getElementById('select-area').value;
            const maquina = document.getElementById('select-maquina').value;
            const desc = document.getElementById('desc-averia').value;

            if (!area || !maquina || !desc) {
                alert("Por favor, complete todos los campos.");
                return;
            }

            if (id) {
                await fetchAPI({
                    action: 'editTicketContent',
                    id: id,
                    area: area,
                    maquina: maquina,
                    descripcion: desc
                });
                cancelarEdicion();
            } else {
                await fetchAPI({
                    action: 'createTicket',
                    area: area,
                    maquina: maquina,
                    descripcion: desc,
                    usuario: currentUser
                });
                document.getElementById('desc-averia').value = "";
            }

            loadDashboard();
        }

        function prepararEdicion(id, area, maquina, descripcion) {
            document.getElementById('form-title').innerText = "Editar Avería";
            document.getElementById('edit-ticket-id').value = id;
            poblarDesplegablesYFiltros();
            document.getElementById('select-area').value = area;
            document.getElementById('select-maquina').value = maquina;
            document.getElementById('desc-averia').value = descripcion;
            document.getElementById('btn-submit-form').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel-edit').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            document.getElementById('form-title').innerText = "Reportar Nueva Avería";
            document.getElementById('edit-ticket-id').value = "";
            document.getElementById('select-area').value = "";
            document.getElementById('select-maquina').value = "";
            document.getElementById('desc-averia').value = "";
            document.getElementById('btn-submit-form').innerText = "Crear Parte";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function abrirFormularioOT(id, area, maquina) {
            document.getElementById('form-mantenimiento').style.display = "block";
            document.getElementById('mante-ticket-id').value = id;
            document.getElementById('mante-ot-info').innerText = `OT-${id} en ${area} (${maquina})`;
            
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('mante-fecha-cierre').value = hoy;

            document.getElementById('mante-horas').value = "";
            document.getElementById('mante-materiales').value = "";
            document.getElementById('mante-observaciones').value = "";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarCierreOT() {
            document.getElementById('form-mantenimiento').style.display = "none";
            document.getElementById('mante-ticket-id').value = "";
        }

        async function enviarCierreOT() {
            const id = document.getElementById('mante-ticket-id').value;
            const fechaCierre = document.getElementById('mante-fecha-cierre').value;
            const horas = document.getElementById('mante-horas').value;
            const mat = document.getElementById('mante-materiales').value;
            const obs = document.getElementById('mante-observaciones').value;

            if(!fechaCierre || !horas || !mat || !obs) {
                alert("Por favor, introduzca la fecha de cierre y complete todos los campos de la intervención.");
                return;
            }

            await fetchAPI({
                action: 'closeOT',
                id: id,
                horas: horas,
                materiales: mat,
                obsMante: obs,
                fechaCierre: fechaCierre
            });

            cancelarCierreOT();
            loadDashboard();
        }

        async function borrarAveria(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este parte de avería permanentemente?")) {
                await fetchAPI({ action: 'deleteTicket', id: id });
                loadDashboard();
            }
        }

        async function cambiarEstado(id, nuevoEstado) {
            if (confirm(`¿Confirmas cambiar el estado a ${nuevoEstado}?`)) {
                await fetchAPI({ action: 'updateTicketStatus', id: id, nuevoEstado: nuevoEstado });
                loadDashboard();
            }
        }
    </script>
</body>
</html>
