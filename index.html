<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini GMAO - Operaciones</title>
    <style>
        :root {
            --tradebe-blue: #003B5C;
            --tradebe-green: #85C441;
            --gray-light: #f4f7f6;
            --gray-dark: #808080;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gray-light);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--tradebe-blue);
            color: white;
            width: 100%;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--tradebe-green);
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Utilidades Formulario */
        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--tradebe-green);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #6da332;
        }

        /* Dashboard */
        #dashboard-section { display: none; }
        
        .role-badge {
            display: inline-block;
            background-color: var(--tradebe-blue);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-bottom: 15px;
        }

        /* Lista de Averías */
        .ticket-card {
            border: 1px solid #eee;
            border-left: 5px solid var(--tradebe-blue);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-info h4 { margin: 0 0 5px 0; }
        .ticket-info p { margin: 0; font-size: 0.9em; color: #555; }
        
        .btn-action {
            width: auto;
            padding: 8px 15px;
            margin: 0;
        }

        /* Estilos condicionales Mantenimiento */
        .estado-gris { color: var(--gray-dark); }
        .estado-negrita { font-weight: bold; color: black; }
        
        #loading { display: none; text-align: center; color: var(--tradebe-blue); font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <h2>Sistema GMAO</h2>
    </header>

    <div id="loading">Cargando, por favor espera...</div>

    <div class="container" id="login-section">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="username" placeholder="Usuario" autocomplete="off">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <p id="login-error" style="color: red; display: none;"></p>
    </div>

    <div class="container" id="dashboard-section">
        <div>
            Bienvenido, <span id="display-user" style="font-weight: bold;"></span> 
            <span class="role-badge" id="display-role"></span>
            <button onclick="logout()" style="width: auto; float: right; background-color: #dc3545; padding: 5px 10px;">Salir</button>
        </div>
        <hr>

        <div id="form-produccion" style="display: none;">
            <h3>Reportar Nueva Avería</h3>
            <select id="select-area"><option value="">Selecciona Área</option></select>
            <select id="select-maquina"><option value="">Selecciona Máquina</option></select>
            <textarea id="desc-averia" rows="3" placeholder="Describe la avería en detalle..."></textarea>
            <button onclick="enviarAveria()">Crear Parte</button>
            <hr>
        </div>

        <h3>Listado de Averías</h3>
        <div id="tickets-container"></div>
    </div>

    <script>
        // ==========================================================
        // INSERTE ENLACE APPSCRIPT AQUI ABAJO
        // ==========================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4TfGQ1yrpdC7n6-wfRT2YODY44if0Rd3K4y1zF2_40GRCmrPACPWCsmt46Nb0o2Rh/exec"; 
        
        let currentUser = "";
        let currentRole = "";

        // Función base para comunicarse con Apps Script
        async function fetchAPI(payload) {
            document.getElementById('loading').style.display = 'block';
            try {
                // Usamos text/plain para evitar el preflight de CORS de los navegadores
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                document.getElementById('loading').style.display = 'none';
                if (!result.success) throw new Error(result.error);
                return result.data;
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert("Error: " + error.message);
                throw error;
            }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            try {
                const data = await fetchAPI({ action: 'login', usuario: user, password: pass });
                currentUser = user;
                currentRole = data.rol;
                
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('display-role').innerText = currentRole;

                if (currentRole === 'Produccion') {
                    document.getElementById('form-produccion').style.display = 'block';
                }

                loadDashboard();
            } catch (e) {
                document.getElementById('login-error').innerText = e.message;
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            currentUser = ""; currentRole = "";
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('form-produccion').style.display = 'none';
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
        }

        async function loadDashboard() {
            const data = await fetchAPI({ action: 'getData' });
            
            // Llenar selects si es Produccion
            if (currentRole === 'Produccion') {
                const sArea = document.getElementById('select-area');
                const sMaquina = document.getElementById('select-maquina');
                sArea.innerHTML = '<option value="">Selecciona Área</option>';
                sMaquina.innerHTML = '<option value="">Selecciona Máquina</option>';
                
                data.areas.forEach(a => sArea.innerHTML += `<option value="${a}">${a}</option>`);
                data.maquinas.forEach(m => sMaquina.innerHTML += `<option value="${m}">${m}</option>`);
            }

            renderTickets(data.tickets);
        }

        function renderTickets(tickets) {
            const container = document.getElementById('tickets-container');
            container.innerHTML = "";

            if (tickets.length === 0) {
                container.innerHTML = "<p>No hay averías registradas.</p>";
                return;
            }

            tickets.forEach(t => {
                let statusClass = "";
                
                // Lógica visual específica para Mantenimiento
                if (currentRole === 'Mantenimiento') {
                    if (t.estado === 'Pendiente') statusClass = "estado-gris";
                    if (t.estado === 'Validada') statusClass = "estado-negrita";
                }

                let ticketHTML = `
                    <div class="ticket-card ${statusClass}">
                        <div class="ticket-info">
                            <h4>${t.area} - ${t.maquina}</h4>
                            <p>${t.descripcion}</p>
                            <p><strong>Estado:</strong> ${t.estado} | <strong>Por:</strong> ${t.usuario}</p>
                        </div>
                `;

                // Lógica de botones según el rol
                if (currentRole === 'Ingenieria' && t.estado === 'Pendiente') {
                    ticketHTML += `<button class="btn-action" onclick="actualizarEstado(${t.id}, 'Validada')">Validar</button>`;
                } else if (currentRole === 'Mantenimiento' && t.estado === 'Validada') {
                    ticketHTML += `<button class="btn-action" onclick="actualizarEstado(${t.id}, 'Cerrada')">Cerrar</button>`;
                }

                ticketHTML += `</div>`;
                container.innerHTML += ticketHTML;
            });
        }

        async function enviarAveria() {
            const area = document.getElementById('select-area').value;
            const maquina = document.getElementById('select-maquina').value;
            const desc = document.getElementById('desc-averia').value;

            if (!area || !maquina || !desc) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            await fetchAPI({
                action: 'createTicket',
                area: area,
                maquina: maquina,
                descripcion: desc,
                usuario: currentUser
            });

            document.getElementById('desc-averia').value = ""; // limpiar
            loadDashboard(); // recargar lista
        }

        async function actualizarEstado(id, nuevoEstado) {
            if(confirm(`¿Estás seguro de marcar el parte como ${nuevoEstado}?`)) {
                await fetchAPI({
                    action: 'updateTicket',
                    id: id,
                    nuevoEstado: nuevoEstado
                });
                loadDashboard();
            }
        }
    </script>
</body>
</html>
